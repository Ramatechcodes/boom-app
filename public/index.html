<!DOCTYPE html>
<html>
<head>
  <title>Live Location Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }
    #map {
      height: 90vh;
      width: 100%;
    }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
<input type="text" id="manualAddress" placeholder="Enter your full address">
<button onclick="saveAddress()">Save</button>
<h2>Live Location Tracker</h2>
<div id="map"></div>


<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const socket = io();

const map = L.map('map').setView([6.5244, 3.3792], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const markers = {};

async function getAddress(lat, lon) {


  const res = await fetch(url);
  const data = await res.json();

  if (!data.results || data.results.length === 0) {
    return "Address not found";
  }

  return data.results[0].formatted_address;
}

// send location
const sessionId = localStorage.getItem("sessionId"); // or pass it dynamically

navigator.geolocation.watchPosition((position) => {
  const { latitude, longitude } = position.coords;

  socket.emit("send-location", {
    sessionId,   // ✅ VERY IMPORTANT
    latitude,
    longitude
  });
});
// receive location
socket.on("receive-location", (data) => {
  const { id, latitude, longitude, address } = data;

  const link = `https://www.google.com/maps?q=${latitude},${longitude}`;

  const popupContent = `
    ${address} <br><br>
    <a href="${link}" target="_blank">Open in Google Maps</a>
  `;

  if (markers[id]) {
    markers[id].setLatLng([latitude, longitude]);
  } else {
    markers[id] = L.marker([latitude, longitude]).addTo(map);
  }

  markers[id].bindPopup(popupContent);
  map.setView([latitude, longitude]);
});
// remove user
socket.on("user-disconnected", (id) => {
  if (markers[id]) {
    map.removeLayer(markers[id]);
    delete markers[id];
  }
});
</script>

</body>
</html>
