<!DOCTYPE html>
<html>
<head>
  <title>Access Dashboard</title>
<link 
  rel="stylesheet" 
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>🔐 Dashboard Access</h2>
<p id="timer"></p>
<input id="code" placeholder="Enter Access Code">
<button onclick="login()">Login</button>
<button onclick="pay()">Pay ₦3000</button>
<footer>
<div style="
  margin-top:20px;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
">
  <h3>📩 Support & Complaints</h3>

  <p>
    If you have any issues, questions, or complaints,
    contact support below:
  </p>

  <a 
    href="mailto:ramatechcode14@gmail.com"
    style="
      color:#38bdf8;
      text-decoration:none;
      font-weight:bold;
    "
  >
    ramatechcode14@gmail.com
  </a>
</div>
</footer>
<hr>

<div id="data"></div>

<script>
async function startTimer(code) {
  const res = await fetch("/session/" + code);
  const data = await res.json();

  let expires = new Date(data.expiresAt).getTime();

  setInterval(() => {
    const now = Date.now();
    const diff = Math.floor((expires - now) / 1000);

    if (diff <= 0) {
     alert("Session expired. Please purchase again.");
window.location.href = "/pay.html";
    }

    const min = Math.floor(diff / 60);
    const sec = diff % 60;

    document.getElementById("timer").innerText =
      "Expires in: " + min + "m " + sec + "s";
  }, 1000);
}
async function pay() {
  const email = prompt("Enter email");

  const res = await fetch("/pay", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  window.location.href = data.paymentLink;
}

async function login() {
  const code = document.getElementById("code").value;

  const res = await fetch("/verify/" + code);
  const data = await res.json();

  if (!data.ok) {
    alert(data.error === "expired" ? "Code expired" : "Invalid code");
    return;
  }

  startTimer(code);   // ✅ start timer AFTER success
  loadLocations();
}

async function loadLocations() {

  const code = document.getElementById("code").value;

  const res = await fetch("/locations/" + code);
  const data = await res.json();

  if (data.error) {
    alert("Session expired. Please pay again.");
    return;
  }

  const box = document.getElementById("data");

  box.innerHTML = "";

  data.forEach((loc, index) => {

    const mapId = "map" + index;

    box.innerHTML += `
      <div class="card">

        <b>ID:</b> ${loc._id}<br><br>

        <b>Latitude:</b> ${loc.latitude}<br>
        <b>Longitude:</b> ${loc.longitude}<br><br>

        <b>Address:</b><br>
        ${loc.address}<br><br>

        <b>Date:</b>
        ${new Date(loc.createdAt).toLocaleString()}<br><br>

        <button onclick="toggleMap('${mapId}')">
          📍 View Map
        </button>

        <a 
          href="https://www.google.com/maps?q=${loc.latitude},${loc.longitude}" 
          target="_blank"
        >
          <button>
            🌍 Open In Google Maps
          </button>
        </a>

        <div 
          id="${mapId}" 
          style="
            height:300px;
            margin-top:15px;
            display:none;
            border-radius:10px;
          "
        ></div>

      </div>
    `;

    setTimeout(() => {

      const map = L.map(mapId).setView(
        [loc.latitude, loc.longitude],
        15
      );

      L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
          attribution: '© OpenStreetMap'
        }
      ).addTo(map);

      L.marker([
        loc.latitude,
        loc.longitude
      ])
      .addTo(map)
      .bindPopup(`
        📍 ${loc.address}
      `)
      .openPopup();

      window[mapId] = map;

    }, 100);

  });

}

function toggleMap(id) {

  const mapDiv = document.getElementById(id);

  if (mapDiv.style.display === "none") {

    mapDiv.style.display = "block";

    setTimeout(() => {

      if (window[id]) {
        window[id].invalidateSize();
      }

    }, 300);

  } else {

    mapDiv.style.display = "none";

  }

}
</script>

</body>
</html>
